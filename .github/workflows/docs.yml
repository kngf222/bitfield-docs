name: Docs

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run docs:generate
      - run: npm run docs:check
      - run: npm run docs:mint
      - run: git diff --exit-code -- docs.json llms.txt
      - run: git diff --check
